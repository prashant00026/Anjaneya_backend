<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block subject %}Anjaneya{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:Inter,Arial,sans-serif;color:#222;">
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background:#f5f5f5;padding:24px 0;">
    <tr><td align="center">
      <table role="presentation" cellpadding="0" cellspacing="0" width="600" style="max-width:600px;background:#fff;border:1px solid #eee;border-radius:8px;">
        <tr><td style="padding:20px 24px;border-bottom:1px solid #eee;">
          <strong style="font-size:16px;">Anjaneya Global Realty</strong>
          <span style="color:#888;font-size:12px;margin-left:8px;">Admin notification</span>
        </td></tr>
        <tr><td style="padding:24px;">
          {% block body %}{% endblock %}
        </td></tr>
        <tr><td style="padding:16px 24px;border-top:1px solid #eee;color:#888;font-size:11px;">
          You're receiving this because this address is listed in
          <code>ENQUIRY_NOTIFICATION_EMAILS</code>. To stop these emails,
          remove the address from that env var on the backend.
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
