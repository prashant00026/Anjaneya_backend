# Anjaneya Global Realty — nginx site config.
# Deployed to /etc/nginx/sites-available/anjaneya by install_nginx.sh.
#
# Rate-limit zones (anjaneya_general, anjaneya_enquiry) are injected into
# /etc/nginx/nginx.conf's http {} block by provision.sh.

upstream anjaneya_backend {
    server unix:/run/anjaneya/gunicorn.sock fail_timeout=0;
}

# HTTP -> HTTPS redirect (and the ACME challenge path for certbot).
server {
    listen 80;
    listen [::]:80;
    server_name anjaneyaglobalrealty.com www.anjaneyaglobalrealty.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name anjaneyaglobalrealty.com www.anjaneyaglobalrealty.com;

    ssl_certificate /etc/letsencrypt/live/anjaneyaglobalrealty.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anjaneyaglobalrealty.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # Static files — collected by `collectstatic`, served straight from disk.
    location /static/ {
        alias /home/jarvis/anjaneya/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Media files — user uploads on the droplet's local filesystem.
    location /media/ {
        alias /home/jarvis/anjaneya/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    location = /health/ {
        proxy_pass http://anjaneya_backend;
        access_log off;
    }

    location = /health/ready/ {
        proxy_pass http://anjaneya_backend;
        access_log off;
    }

    # Public enquiry POST — tighter rate limit than the rest of the API.
    # NOTE: the Step 10 brief's regex targeted /api/v1/(contact|properties/
    # <id>/enquiries)/ — endpoints this project does not have. The real
    # public-write endpoint is /api/v1/enquiries/ (see apps/enquiries/urls.py),
    # so the location below matches that. This block must precede the
    # generic /api/ block so it wins the longest-prefix... actually nginx
    # evaluates regex locations before prefix locations, so order here is
    # cosmetic — but kept first for clarity.
    location ~ ^/api/v1/enquiries/ {
        limit_req zone=anjaneya_enquiry burst=5 nodelay;
        proxy_pass http://anjaneya_backend;
        include /etc/nginx/proxy_params;
    }

    location /api/ {
        limit_req zone=anjaneya_general burst=50 nodelay;
        proxy_pass http://anjaneya_backend;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 60s;
    }

    location /admin/ {
        proxy_pass http://anjaneya_backend;
        include /etc/nginx/proxy_params;
    }

    location / {
        proxy_pass http://anjaneya_backend;
        include /etc/nginx/proxy_params;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;
}
